name: Production Incident
description: Report a production incident for triage and escalation
title: "[Incident]: "
labels: ["incident", "production"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - SEV1 - Critical outage
        - SEV2 - Major degradation
        - SEV3 - Minor degradation
        - SEV4 - Low impact
    validations:
      required: true

  - type: input
    id: started_at
    attributes:
      label: Incident start time (UTC)
      placeholder: "2026-03-24T01:00:00Z"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: What user-facing impact is occurring?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which services/routes/features are affected?
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Current mitigation
      description: What has already been attempted?
    validations:
      required: true

  - type: textarea
    id: next_steps
    attributes:
      label: Next actions
      description: Immediate next actions and owners.
    validations:
      required: true
