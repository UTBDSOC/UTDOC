name: Deploy Main

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  post-deploy-health:
    name: Post-Deploy Health
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Health check
        run: npm run health:check
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          HEALTHCHECK_EXPECTED_STATUS: ok
